name: parkinson_assistive_shoe
description: Parkinson's Assistive Smart Shoe System - Flutter mobile app
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  provider: ^6.1.2

  # BLE
  flutter_blue_plus: ^1.31.18

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4

  # Charts
  fl_chart: ^0.69.0

  # Alerts
  audioplayers: ^6.1.0
  vibration: ^1.8.4

  # Local persistence
  shared_preferences: ^2.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/


